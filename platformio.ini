; PlatformIO Project Configuration File
; Waveshare ESP32-S3-Touch-LCD-2.8B — Mac Plus Emulator

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; 16MB Flash, OPI PSRAM
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.arduino.memory_type = dio_opi
board_upload.flash_size = 16MB

; USB CDC for serial
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -Isrc/tme
    -Isrc/tme/musashi

; Exclude non-compilable Musashi files
build_src_filter =
    +<*>
    -<tme/musashi/m68k_in.c>
    -<tme/musashi/m68kmake.c>
    -<tme/musashi/m68kdasm.c>
    -<tme/musashi/m68kops.c>

; No external libs needed
lib_deps =

upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101
